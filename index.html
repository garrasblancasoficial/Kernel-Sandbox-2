<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NEXUS: VOXEL.SYS v9.0 - OMNI ARCHITECT (SAUL)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: #0f0; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,10,0,0.95); padding: 10px; border: 1px solid #0f0; width: 380px; max-height: 95vh; overflow-y: auto; z-index: 100; font-size: 10px; scrollbar-width: thin; }
        .category { margin-bottom: 8px; border-left: 2px solid #0f0; padding-left: 5px; background: rgba(0,30,0,0.2); }
        .cat-name { font-weight: bold; color: #fff; display: block; padding: 2px; text-transform: uppercase; border-bottom: 1px solid #050; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 3px; }
        button { background: #010; color: #0f0; border: 1px solid #040; padding: 4px; cursor: pointer; font-size: 8px; text-align: left; text-overflow: ellipsis; overflow: hidden; }
        button:hover { background: #0f0; color: #000; }
        .active { background: #0f0 !important; color: #000 !important; }
        #monitor { margin-top: 10px; border: 1px solid #0f0; padding: 5px; background: #000; height: 60px; font-size: 9px; color: #0f0; overflow: hidden; }
    </style>
</head>
<body>

<div id="ui">
    <div style="text-align:center; font-size: 14px; border-bottom: 2px solid #0f0; margin-bottom: 8px;">NEXUS_OS // ARCHITECT: SAUL</div>
    <div id="monitor">SISTEMA: Standby<br>USUARIO: SAUL_ROOT</div>
    <div id="menu"></div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

// --- DATABASE MAESTRA (TODO LO MENCIONADO) ---
const DB = {
    'LAND': { 'SAND': 0xd2b48c, 'DIRT': 0x553311, 'ROCK': 0x777777, 'CLAY': 0xa52a2a, 'GRAVEL': 0x696969, 'SNOW': 0xffffff },
    'LIQUIDS': { 'WATER': 0x00aaff, 'ACID': 0x00ff00, 'LAVA': 0xff4400, 'OIL': 0x111111, 'MERCURY': 0xaaaaaa, 'HONEY': 0xffaa00 },
    'LIFE': { 'HUMAN': 0xffffff, 'ANT': 0xff0000, 'TREE': 0x5d4037, 'GRASS': 0x228822, 'VIRUS': 0xff00ff, 'CANCER': 0x880000 },
    'ENERGY': { 'FIRE': 0xff8800, 'LIGHTNING': 0x00ffff, 'RAD': 0xccff00, 'GOD_RAY': 0xffffaa, 'PLASMA': 0xff00ff },
    'WEAPONS': { 'TNT': 0xff0000, 'NUKE': 0xffff00, 'C4': 0x444444, 'NITRO': 0xaa00ff },
    'MACHINES': { 'BATTERY': 0x00ff00, 'MOTOR': 0x555555, 'WIRE': 0x333333, 'SENSOR': 0x8800ff, 'PISTON': 0xaaaaaa },
    'SPECIAL': { 'VOID': 0x000000, 'BLACK_HOLE': 0x110022, 'CLONE': 0x00ffaa, 'ERASE': 0x000000, 'PICK': 0x00ff00, 'FILLER': 0xffffff }
};

let current = 'SAND';
const world = {}; const meshes = {}; const entities = [];
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Generar Interfaz Dinámica
const menu = document.getElementById('menu');
for(let cat in DB) {
    let d = document.createElement('div'); d.className = 'category';
    d.innerHTML = `<span class="cat-name">${cat}</span>`;
    let g = document.createElement('div'); g.className = 'grid';
    for(let el in DB[cat]) {
        let b = document.createElement('button'); b.innerText = el;
        b.onclick = () => { current = el; log(`MODO: ${el} ACTIVADO`); };
        g.appendChild(b);
    }
    d.appendChild(g); menu.appendChild(d);
}

const geo = new THREE.BoxGeometry(0.95, 0.95, 0.95);

function setV(x, y, z, name) {
    const k = `${x},${y},${z}`;
    if(meshes[k]) { scene.remove(meshes[k]); delete meshes[k]; delete world[k]; }
    if(name && name !== 'VOID' && name !== 'ERASE') {
        const color = findColor(name);
        const m = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({color: color}));
        m.position.set(x, y, z);
        scene.add(m); meshes[k] = m; world[k] = { name: name, temp: 20 };
    }
}

function findColor(n) {
    for(let c in DB) if(DB[c][n]) return DB[c][n];
    return 0x555555;
}

// --- LÓGICA DE PODERES Y HERRAMIENTAS ---
function handleAction(x, y, z) {
    const k = `${x},${y},${z}`;
    if (current === 'PICK' && world[k]) {
        current = world[k].name;
        log(`GOTERO: ${current} COPIADO`);
    } else if (current === 'BLACK_HOLE') {
        explode(x, y, z, 6, true);
    } else if (current === 'FILLER') {
        for(let ix=-3; ix<=3; ix++) for(let iz=-3; iz<=3; iz++) setV(x+ix, y, z+iz, 'ROCK');
    } else if (current === 'HUMAN') {
        entities.push({x:x, y:y, z:z});
    } else {
        setV(x, y, z, current);
    }
}

function explode(x, y, z, r, isVoid = false) {
    for(let ix=-r; ix<=r; ix++) for(let iy=-r; iy<=r; iy++) for(let iz=-r; iz<=r; iz++) {
        if(Math.random() > 0.3) setV(x+ix, y+iy, z+iz, null);
    }
    if(!isVoid) log("ALERTA: EXPLOSIÓN DETECTADA");
}

// Loop Principal
function update() {
    Object.keys(world).forEach(k => {
        const [x,y,z] = k.split(',').map(Number);
        const name = world[k].name;
        const abajo = `${x},${y-1},${z}`;

        // Gravedad (Sand, Snow, Gravel)
        if(['SAND', 'SNOW', 'GRAVEL', 'WATER', 'LAVA'].includes(name) && y > 1 && !world[abajo]) {
            setV(x,y,z,null); setV(x,y-1,z,name);
        }
        // Infección (Virus/Cáncer)
        if(name === 'VIRUS' || name === 'CANCER') {
            const v = [`${x+1},${y},${z}`, `${x},${y+1},${z}`];
            v.forEach(vec => { if(world[vec] && world[vec].name !== name && Math.random() > 0.99) setV(vec.split(',')[0], vec.split(',')[1], vec.split(',')[2], name); });
        }
    });

    // IA Humanos
    entities.forEach(h => {
        setV(Math.round(h.x), Math.round(h.y), Math.round(h.z), null);
        h.x += (Math.random()-0.5)*0.2; h.z += (Math.random()-0.5)*0.2;
        setV(Math.round(h.x), Math.round(h.y), Math.round(h.z), 'HUMAN');
    });
}

window.addEventListener('mousedown', () => {
    let rx = Math.round((Math.random()-0.5)*18), rz = Math.round((Math.random()-0.5)*18);
    handleAction(rx, 1, rz);
});

function log(m) { const mon = document.getElementById('monitor'); mon.innerHTML = "> " + m + "<br>" + mon.innerHTML; }
camera.position.set(20, 18, 20); camera.lookAt(0,0,0);
function loop() { update(); renderer.render(scene, camera); requestAnimationFrame(loop); }
loop();

</script>
</body>
</html>
