<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NEXUS: VOXEL.SYS v13.0 - PRECISION (MIKE)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: #0f0; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,10,0,0.9); padding: 12px; border: 2px solid #0f0; width: 320px; z-index: 100; pointer-events: auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        button { background: #000; color: #0f0; border: 1px solid #0f0; padding: 6px; cursor: pointer; font-size: 11px; text-transform: uppercase; }
        button:hover { background: #0f0; color: #000; }
        #monitor { margin-top: 10px; border-top: 1px solid #0f0; padding-top: 5px; font-size: 10px; color: #0f0; }
    </style>
</head>
<body>

<div id="ui">
    <div style="text-align:center; font-weight:bold; letter-spacing: 2px;">PRECISION_ENGINE // MIKE</div>
    <div id="monitor">CURSOR: Esperando...</div>
    <div class="grid" id="buttons"></div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

// --- CONFIGURACIÓN DE TEXTURAS RECONOCIBLES ---
const loader = new THREE.TextureLoader();
const getTex = (url) => {
    const t = loader.load(url);
    t.magFilter = THREE.NearestFilter;
    t.minFilter = THREE.NearestFilter;
    return t;
};

const ASSETS = {
    'SAND': getTex('https://i.imgur.com/K6Y7Nsh.png'), // Textura de arena granulada
    'ROCK': getTex('https://i.imgur.com/8Nn6fM1.png'), // Piedra sólida
    'HUMAN': getTex('https://i.imgur.com/6Xw6Q7n.png'), // Sprite de humano con cara y ropa
    'WATER': getTex('https://i.imgur.com/Y8XvR0z.png')  // Agua pixelada
};

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Iluminación para que todo se vea claro
const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 2);
scene.add(hemi);
const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(10, 20, 10);
scene.add(dirLight);

// Plano de detección (Suelo invisible para colocar cosas donde sea)
const groundGeo = new THREE.PlaneGeometry(100, 100);
const groundMat = new THREE.MeshPhongMaterial({ color: 0x111111, side: THREE.DoubleSide });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

const world = {}; const meshes = {};
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let current = 'SAND';
let isDrawing = false;

// Generar Botones
const btnContainer = document.getElementById('buttons');
['SAND', 'ROCK', 'HUMAN', 'WATER', 'ERASE'].forEach(type => {
    const b = document.createElement('button');
    b.innerText = type;
    b.onclick = () => { current = type; };
    btnContainer.appendChild(b);
});

function placeElement(point) {
    const x = Math.round(point.x);
    const z = Math.round(point.z);
    const y = 0.5; // Altura base
    const k = `${x},${y},${z}`;

    if (current === 'ERASE') {
        if (meshes[k]) { scene.remove(meshes[k]); delete meshes[k]; delete world[k]; }
        return;
    }

    if (!world[k]) {
        const geo = new THREE.BoxGeometry(0.95, 0.95, 0.95);
        const mat = new THREE.MeshStandardMaterial({ map: ASSETS[current] || ASSETS['ROCK'] });
        if(current === 'WATER') { mat.transparent = true; mat.opacity = 0.6; }
        
        const m = new THREE.Mesh(geo, mat);
        m.position.set(x, y, z);
        scene.add(m);
        meshes[k] = m;
        world[k] = { name: current };
    }
}

// --- CONTROLES DE PRECISIÓN ---
window.addEventListener('mousedown', (e) => { if(e.target === document.body) isDrawing = true; });
window.addEventListener('mouseup', () => isDrawing = false);
window.addEventListener('mousemove', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(ground);
    
    if (intersects.length > 0) {
        const p = intersects[0].point;
        document.getElementById('monitor').innerText = `X: ${p.x.toFixed(1)} Z: ${p.z.toFixed(1)} | MODO: ${current}`;
        if (isDrawing) placeElement(p);
    }
});

camera.position.set(20, 20, 20);
camera.lookAt(0, 0, 0);

function animate() {
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}
animate();

</script>
</body>
</html>
